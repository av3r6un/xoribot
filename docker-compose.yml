services:
  xoribot:
    build:
      context: .
      args:
        INSTALL_FFMPEG: ${INSTALL_FFMPEG:-1}
    container_name: xoribot
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      WHISPER_BASE_URL: ${WHISPER_BASE_URL:-http://whisper:8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - xoribot-tools

  valkey:
    image: docker.io/valkey/valkey:9-alpine
    container_name: xb-valkey
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - valkey-data:/data
    networks:
      - xoribot-tools

  searxng:
    image: docker.io/searxng/searxng:${SEARXNG_VERSION:-latest}
    container_name: xb-searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_HOST:-0.0.0.0}:${SEARXNG_PORT:-8081}:8080"
    env_file:
      - ./tools/searxng/.env
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8081/}
    volumes:
      - ./tools/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng-cache:/var/cache/searxng
    depends_on:
      - valkey
    networks:
      xoribot-tools:
        aliases: [searxng]
    
  whisper:
    image: ghcr.io/speaches-ai/speaches:latest-cpu
    container_name: whisper
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./tools/whisper/.env
    environment:
      PRELOAD_MODELS: '["Systran/faster-whisper-small"]'
      HF_HUB_CACHE: /home/ubuntu/.cache/huggingface/hub
    volumes:
      - ./models/whisper/hf-hub-cache:/home/ubuntu/.cache/huggingface/hub
    networks:
      - xoribot-tools

volumes:
  searxng-cache:
  valkey-data:

networks:
  xoribot-tools:
    external: true
