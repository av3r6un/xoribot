services:
  xoribot:
    build: .
    container_name: xoribot
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - xoribot-tools

networks:
  xoribot-tools:
    external: true
