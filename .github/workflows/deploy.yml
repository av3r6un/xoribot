name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-over-ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0

      - name: Calculate Version
        shell: bash
        run: |
          set -e
          merge_count="$(git rev-list --count --merges HEAD)"
          version="0.1.${merge_count}"
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          short_sha="$(git rev-parse --short HEAD)"

          echo "APP_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "APP_BUILD_TIME=${build_time}" >> "${GITHUB_ENV}"
          echo "APP_GIT_SHA=${short_sha}" >> "${GITHUB_ENV}"

          {
            echo "APP_VERSION=${version}"
            echo "APP_BUILD_TIME=${build_time}"
            echo "APP_GIT_SHA=${short_sha}"
          } > VERSION

          echo "Deploy version: ${version} (${short_sha})"

      - name: Pack Repository
        shell: bash
        run: |
          archive_path="${RUNNER_TEMP}/release.tgz"
          rm -f "${archive_path}"
          tar \
            --exclude=.git \
            --exclude=.venv \
            --exclude=__pycache__ \
            --exclude=.github \
            --exclude=.env \
            --exclude='*/.env' \
            --exclude='tools/searxng/.env' \
            --exclude='tools/whisper/models' \
            -czf "${archive_path}" .
          cp "${archive_path}" release.tgz

      - name: Copy Release Bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: release.tgz
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy On Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            tar -xzf release.tgz
            rm -f release.tgz
            cat > .env <<'EOF'
            ${{ secrets.DEPLOY_ENV_FILE }}
            EOF
            cat >> .env <<'EOF'
            APP_VERSION=${{ env.APP_VERSION }}
            APP_BUILD_TIME=${{ env.APP_BUILD_TIME }}
            APP_GIT_SHA=${{ env.APP_GIT_SHA }}
            EOF
            docker compose down
            docker compose up -d --build
