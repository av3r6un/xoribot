name: CI And PR

on:
  push:
    branches-ignore:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  docker-build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Build Image
        run: docker build -t xoribot-ci:latest .

      - name: Check Python Version
        run: docker run --rm xoribot-ci:latest uv run python -c "import sys; assert sys.version_info >= (3, 14); print(sys.version)"

      - name: Compile Sources
        run: docker run --rm xoribot-ci:latest uv run python -m compileall src main.py

      - name: Check Imports
        run: docker run --rm xoribot-ci:latest uv run python -c "from ollama_tg_bot.bot import BotApp; from ollama_tg_bot.config import load_settings; from ollama_tg_bot.ollama_client import OllamaClient; print('imports ok')"

  create-and-merge-pr:
    if: github.event_name == 'push' && github.ref != 'refs/heads/master'
    needs: docker-build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Check Automation Token
        shell: bash
        run: |
          if [ -z "${{ secrets.AUTOMATION_TOKEN }}" ]; then
            echo "AUTOMATION_TOKEN secret is required so merge-to-master can trigger deploy workflow."
            exit 1
          fi

      - name: Create Or Merge Pull Request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AUTOMATION_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = context.ref.replace('refs/heads/', '');
            const base = 'master';

            if (head === base) {
              core.info('Branch is master, skipping auto-merge.');
              return;
            }

            const { data: existing } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${head}`,
              base,
            });

            let pr = existing[0];

            if (!pr) {
              const { data: created } = await github.rest.pulls.create({
                owner,
                repo,
                head,
                base,
                title: `Auto merge ${head} into ${base}`,
                body: [
                  'This pull request was created automatically by GitHub Actions after CI passed.',
                  '',
                  `Source branch: \`${head}\``,
                  `Target branch: \`${base}\``,
                ].join('\n'),
              });
              pr = created;
              core.info(`Created PR #${pr.number}.`);
            } else {
              core.info(`Reusing PR #${pr.number}.`);
            }

            let prDetails;
            for (let attempt = 0; attempt < 6; attempt += 1) {
              const response = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pr.number,
              });
              prDetails = response.data;
              if (prDetails.mergeable !== null) {
                break;
              }
              await new Promise((resolve) => setTimeout(resolve, 5000));
            }

            if (!prDetails?.mergeable) {
              core.setFailed(`PR #${pr.number} is not mergeable right now.`);
              return;
            }

            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: pr.number,
              merge_method: 'merge',
            });

            core.info(`Merged PR #${pr.number}.`);

            await github.rest.git.deleteRef({
              owner,
              repo,
              ref: `heads/${head}`,
            });

            core.info(`Deleted branch ${head}.`);
